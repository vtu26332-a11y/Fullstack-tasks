<!DOCTYPE html>
<html>
<head>
<title>Login System</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
width:300px;
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:#2a5298;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.error{
color:red;
margin-top:10px;
text-align:center;
}

.success{
color:green;
margin-top:10px;
text-align:center;
}

</style>

</head>

<body>

<div class="box">

<h2>Login System</h2>

<input type="text" id="username" placeholder="Enter Username">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p id="message"></p>

</div>

<script>

// simulated database
let user={
username:"admin",
password:"12345"
};

function login(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;
let msg=document.getElementById("message");

if(u=="" || p==""){
msg.innerHTML="Please fill all fields";
msg.className="error";
return;
}

if(u===user.username && p===user.password){

msg.innerHTML="Login Successful";
msg.className="success";

}else{

msg.innerHTML="Invalid Username or Password";
msg.className="error";

}

}

</script>

</body>
</html>
